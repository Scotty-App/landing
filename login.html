<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceder - CodeLearn</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <div class="container">
        <h2>Acceder</h2>

        <div class="formulario">
            <input type="email" id="email" placeholder="Correo electrónico">
            <input type="password" id="password" placeholder="Contraseña">
            <button id="btnLogin">Acceder</button>
        </div>

        <p>¿No tienes cuenta? <a href="signup.html">Regístrate</a></p>
    </div>

    <script>

        const btnLogin = document.getElementById("btnLogin");

        btnLogin.addEventListener("click", function() {

            let emailIntroducido    = document.getElementById("email").value;
            let passwordIntroducida = document.getElementById("password").value;

            // Leemos el usuario guardado en localStorage
            // JSON.parse convierte el texto de vuelta a objeto
            let usuarioGuardado = JSON.parse(localStorage.getItem("usuario"));

            // Comprobamos que existe un usuario registrado
            if (usuarioGuardado === null) {
                alert("No hay ningún usuario registrado. Regístrate primero.");
                return;
            }

            // Comparamos email y contraseña con los guardados en el signup
            if (emailIntroducido === usuarioGuardado.email &&
                passwordIntroducida === usuarioGuardado.password) {

                alert("¡Bienvenido, " + usuarioGuardado.nombre + "!");
                window.location.href = "app.html";

            } else {
                alert("Email o contraseña incorrectos.");
            }
        });

    </script>

</body>
</html>
